<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worldweather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #ffffff;
  --bg2: #f7f7f7;
  --border: #e8e8e8;
  --text: #111111;
  --muted: #888888;
  --subtle: #cccccc;
  --good: #2e7d32;
  --moderate: #f57f17;
  --bad: #c62828;
  --vbad: #6a1b9a;
}

body {
  font-family: 'Apple SD Gothic Neo', 'AppleSDGothicNeo', '본고딕', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 3rem 1.5rem 5rem;
}

header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 2px solid var(--text);
  animation: fadeUp 0.5s ease both;
}
.logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.06em; }
.logo-sub { font-size: 0.75rem; color: var(--muted); font-weight: 300; }

.search-wrap {
  display: flex; gap: 0.5rem;
  margin-bottom: 2.5rem;
  animation: fadeUp 0.5s 0.05s ease both;
}
.search-wrap input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.65rem 1rem;
  font-family: 'Apple SD Gothic Neo', 'AppleSDGothicNeo', '본고딕', 'Noto Sans KR', sans-serif;
  font-size: 0.9rem;
  color: var(--text);
  background: var(--bg);
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--text); }
.search-wrap input::placeholder { color: var(--subtle); }
.btn {
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 0.65rem 1.1rem;
  font-family: 'Apple SD Gothic Neo', 'AppleSDGothicNeo', '본고딕', 'Noto Sans KR', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
  white-space: nowrap;
}
.btn:hover { opacity: 0.7; }
.btn-outline {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--text); opacity: 1; }

/* Current */
.current-card {
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
  animation: fadeUp 0.5s 0.1s ease both;
}
.loc-row { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.2rem; }
.current-date { font-size: 0.76rem; color: var(--subtle); margin-bottom: 1.5rem; }
.temp-row {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 1rem;
}
.temp-main { font-size: 6rem; font-weight: 900; line-height: 1; letter-spacing: -4px; }
.temp-unit { font-size: 2.5rem; font-weight: 300; vertical-align: super; letter-spacing: 0; }
.weather-right { text-align: right; padding-top: 0.5rem; }
.weather-icon-big { font-size: 3.5rem; line-height: 1; }
.weather-desc { font-size: 0.9rem; color: var(--muted); margin-top: 0.4rem; }
.feels-like { font-size: 0.76rem; color: var(--subtle); margin-top: 0.15rem; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  margin-top: 1.5rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.detail-item {
  padding: 0.85rem 1rem;
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.detail-item:nth-child(3n) { border-right: none; }
.detail-item:nth-last-child(-n+3) { border-bottom: none; }
.detail-val { font-size: 1.05rem; font-weight: 700; }
.detail-label { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

/* Air Quality */
.aqi-card {
  margin-bottom: 2rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.1rem 1.2rem;
  animation: fadeUp 0.5s 0.15s ease both;
}
.aqi-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.9rem;
}
.aqi-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
.aqi-badge {
  font-size: 0.78rem; font-weight: 700;
  padding: 0.18rem 0.6rem;
  border-radius: 20px; color: #fff;
}
.aqi-good { background: var(--good); }
.aqi-moderate { background: var(--moderate); }
.aqi-bad { background: var(--bad); }
.aqi-vbad { background: var(--vbad); }
.aqi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
.aqi-item { text-align: center; }
.aqi-val { font-size: 1.05rem; font-weight: 700; }
.aqi-lbl { font-size: 0.67rem; color: var(--muted); margin-top: 0.15rem; }

/* Section title */
.section-title {
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.1em; color: var(--muted);
  text-transform: uppercase; margin-bottom: 0.8rem;
}

/* Hourly */
.hourly-wrap { margin-bottom: 2rem; animation: fadeUp 0.5s 0.2s ease both; }
.hourly-scroll {
  display: flex;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  scrollbar-width: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.hourly-item {
  min-width: 68px;
  padding: 0.8rem 0.4rem;
  text-align: center;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  transition: background 0.15s;
}
.hourly-item:last-child { border-right: none; }
.hourly-item:hover, .hourly-item.now { background: var(--bg2); }
.h-time { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.3rem; }
.h-icon { font-size: 1.25rem; margin-bottom: 0.25rem; }
.h-temp { font-size: 0.82rem; font-weight: 700; }
.h-rain { font-size: 0.62rem; color: var(--muted); margin-top: 0.12rem; }

/* Weekly */
.weekly-wrap { animation: fadeUp 0.5s 0.25s ease both; }
.day-row {
  display: grid;
  grid-template-columns: 80px 30px 1fr auto;
  align-items: center;
  gap: 0.8rem;
  padding: 0.8rem 0;
  border-bottom: 1px solid var(--border);
}
.day-row:first-child { border-top: 1px solid var(--border); }
.day-name { font-size: 0.87rem; font-weight: 500; }
.day-icon { font-size: 1.2rem; text-align: center; }
.day-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; position: relative; }
.day-bar { position: absolute; height: 3px; background: var(--text); border-radius: 2px; opacity: 0.25; }
.day-temps { display: flex; gap: 0.5rem; font-size: 0.87rem; white-space: nowrap; }
.t-hi { font-weight: 700; }
.t-lo { color: var(--muted); }

/* Status */
.status {
  text-align: center; padding: 5rem 2rem;
  color: var(--muted); font-size: 0.9rem;
  animation: fadeUp 0.4s ease both;
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}

@media (max-width: 500px) {
  .temp-main { font-size: 4.5rem; }
  .detail-grid { grid-template-columns: repeat(2, 1fr); }
  .detail-item:nth-child(3n) { border-right: 1px solid var(--border); }
  .detail-item:nth-child(2n) { border-right: none; }
  .aqi-grid { grid-template-columns: repeat(2, 1fr); }
  .day-row { grid-template-columns: 68px 26px auto auto; }
  .day-bar-wrap { display: none; }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">Worldweather</div>
    <div class="logo-sub">Open-Meteo · 무료</div>
  </header>

  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="도시 검색  (예: 서울, 부산, Tokyo...)" />
    <button class="btn" onclick="searchCity()">검색</button>
    <button class="btn btn-outline" onclick="getLocation()" title="현재 위치">📍</button>
  </div>

  <div id="content">
    <div class="status">도시를 검색하거나 📍 버튼으로 현재 위치 날씨를 확인하세요</div>
  </div>

</div>
<script>
const GEO = 'https://geocoding-api.open-meteo.com/v1/search';
const WX  = 'https://api.open-meteo.com/v1/forecast';
const AQ  = 'https://air-quality-api.open-meteo.com/v1/air-quality';

const WD = {0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',48:'안개',51:'약한 이슬비',53:'이슬비',55:'강한 이슬비',61:'약한 비',63:'비',65:'강한 비',71:'약한 눈',73:'눈',75:'강한 눈',80:'소나기',81:'강한 소나기',82:'폭우',85:'눈소나기',86:'강한 눈소나기',95:'뇌우',96:'뇌우+우박',99:'강한 뇌우'};
const WI = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌧️',55:'🌧️',61:'🌦️',63:'🌧️',65:'⛈️',71:'🌨️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',95:'⛈️',96:'⛈️',99:'⛈️'};
const DAY = ['일','월','화','수','목','금','토'];

const d = c => WD[c]||'알 수 없음';
const ic = c => WI[c]||'🌡️';
const loading = () => document.getElementById('content').innerHTML='<div class="status"><div class="spinner"></div>불러오는 중...</div>';
const err = m => document.getElementById('content').innerHTML=`<div class="status">${m}</div>`;

async function searchCity(){
  const q = document.getElementById('cityInput').value.trim();
  if(!q) return;
  loading();
  try{
    const r = await fetch(`${GEO}?name=${encodeURIComponent(q)}&count=1&language=ko`);
    const j = await r.json();
    if(!j.results?.length){ err('도시를 찾을 수 없습니다.'); return; }
    const l = j.results[0];
    await fetchAll(l.latitude, l.longitude, l.name+(l.country_code?', '+l.country_code:''));
  }catch{ err('검색 중 오류가 발생했습니다.'); }
}

function getLocation(){
  if(!navigator.geolocation){ err('위치 정보를 지원하지 않는 브라우저입니다.'); return; }
  loading();
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat, longitude:lon} = pos.coords;
    let name='현재 위치';
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ko`);
      const j=await r.json();
      name=j.address?.city||j.address?.town||j.address?.county||name;
    }catch{}
    await fetchAll(lat, lon, name);
  }, ()=>err('위치 접근이 거부되었습니다.'));
}

async function fetchAll(lat, lon, name){
  try{
    const [wr, ar] = await Promise.all([
      fetch(`${WX}?${new URLSearchParams({latitude:lat,longitude:lon,current:'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation',hourly:'temperature_2m,precipitation_probability,weather_code',daily:'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset',timezone:'auto',forecast_days:7,wind_speed_unit:'ms'})}`),
      fetch(`${AQ}?${new URLSearchParams({latitude:lat,longitude:lon,current:'pm10,pm2_5,nitrogen_dioxide,ozone',timezone:'auto'})}`)
    ]);
    render(await wr.json(), await ar.json(), name);
  }catch{ err('날씨 데이터를 불러오지 못했습니다.'); }
}

function aqLevel(pm25){
  if(pm25<=15) return {label:'좋음',cls:'aqi-good'};
  if(pm25<=35) return {label:'보통',cls:'aqi-moderate'};
  if(pm25<=75) return {label:'나쁨',cls:'aqi-bad'};
  return {label:'매우 나쁨',cls:'aqi-vbad'};
}

function render(wx, aq, name){
  const c = wx.current;
  const now = new Date(c.time);
  const dateStr = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // Current
  const cur = `
  <div class="current-card">
    <div class="loc-row">📍 ${name}</div>
    <div class="current-date">${dateStr} · ${timeStr} 기준</div>
    <div class="temp-row">
      <div><span class="temp-main">${Math.round(c.temperature_2m)}</span><span class="temp-unit">°C</span></div>
      <div class="weather-right">
        <div class="weather-icon-big">${ic(c.weather_code)}</div>
        <div class="weather-desc">${d(c.weather_code)}</div>
        <div class="feels-like">체감 ${Math.round(c.apparent_temperature)}°C</div>
      </div>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-val">${c.relative_humidity_2m}%</div><div class="detail-label">습도</div></div>
      <div class="detail-item"><div class="detail-val">${c.wind_speed_10m} m/s</div><div class="detail-label">풍속</div></div>
      <div class="detail-item"><div class="detail-val">${c.precipitation} mm</div><div class="detail-label">강수량</div></div>
      <div class="detail-item"><div class="detail-val">${new Date(wx.daily.sunrise[0]).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div><div class="detail-label">일출</div></div>
      <div class="detail-item"><div class="detail-val">${new Date(wx.daily.sunset[0]).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div><div class="detail-label">일몰</div></div>
      <div class="detail-item"><div class="detail-val">${Math.round(wx.daily.temperature_2m_max[0])}° / ${Math.round(wx.daily.temperature_2m_min[0])}°</div><div class="detail-label">최고 / 최저</div></div>
    </div>
  </div>`;

  // AQI
  let aqi = '';
  if(aq?.current){
    const pm25 = Math.round(aq.current.pm2_5??0);
    const pm10 = Math.round(aq.current.pm10??0);
    const no2  = Math.round(aq.current.nitrogen_dioxide??0);
    const o3   = Math.round(aq.current.ozone??0);
    const lv   = aqLevel(pm25);
    aqi = `
    <div class="aqi-card">
      <div class="aqi-header">
        <div class="aqi-title">대기질 · 미세먼지</div>
        <div class="aqi-badge ${lv.cls}">${lv.label}</div>
      </div>
      <div class="aqi-grid">
        <div class="aqi-item"><div class="aqi-val">${pm25}</div><div class="aqi-lbl">PM2.5 초미세먼지</div></div>
        <div class="aqi-item"><div class="aqi-val">${pm10}</div><div class="aqi-lbl">PM10 미세먼지</div></div>
        <div class="aqi-item"><div class="aqi-val">${no2}</div><div class="aqi-lbl">이산화질소</div></div>
        <div class="aqi-item"><div class="aqi-val">${o3}</div><div class="aqi-lbl">오존</div></div>
      </div>
    </div>`;
  }

  // Hourly
  let hourly = '<div class="hourly-wrap"><div class="section-title">시간별 예보</div><div class="hourly-scroll">';
  let cnt = 0;
  for(let i=0;i<wx.hourly.time.length&&cnt<24;i++){
    const t=new Date(wx.hourly.time[i]);
    if(t<now) continue;
    hourly+=`<div class="hourly-item${cnt===0?' now':''}">
      <div class="h-time">${cnt===0?'지금':t.getHours()+'시'}</div>
      <div class="h-icon">${ic(wx.hourly.weather_code[i])}</div>
      <div class="h-temp">${Math.round(wx.hourly.temperature_2m[i])}°</div>
      <div class="h-rain">🌧 ${wx.hourly.precipitation_probability[i]}%</div>
    </div>`;
    cnt++;
  }
  hourly += '</div></div>';

  // Weekly
  const hi=wx.daily.temperature_2m_max, lo=wx.daily.temperature_2m_min;
  const rng=Math.max(...hi)-Math.min(...lo)||1, rmin=Math.min(...lo);
  let week='<div class="weekly-wrap"><div class="section-title">7일 예보</div>';
  for(let i=0;i<7;i++){
    const dt=new Date(wx.daily.time[i]);
    const dn=i===0?'오늘':i===1?'내일':DAY[dt.getDay()]+'요일';
    const bl=((lo[i]-rmin)/rng*100).toFixed(1);
    const bw=((hi[i]-lo[i])/rng*100).toFixed(1);
    week+=`<div class="day-row">
      <div class="day-name">${dn}</div>
      <div class="day-icon">${ic(wx.daily.weather_code[i])}</div>
      <div class="day-bar-wrap"><div class="day-bar" style="left:${bl}%;width:${bw}%"></div></div>
      <div class="day-temps"><span class="t-hi">${Math.round(hi[i])}°</span><span class="t-lo">${Math.round(lo[i])}°</span></div>
    </div>`;
  }
  week+='</div>';

  document.getElementById('content').innerHTML = cur + aqi + hourly + week;
}

document.getElementById('cityInput').addEventListener('keydown', e=>{ if(e.key==='Enter') searchCity(); });
window.addEventListener('load', ()=>fetchAll(37.5665, 126.9780, '서울'));
</script>
</body>
</html>
