<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨 예보</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0a1628;
    --mid: #0d2244;
    --accent: #4fc3f7;
    --accent2: #f9a825;
    --text: #e8f4fd;
    --muted: #7baecb;
    --card: rgba(255,255,255,0.06);
    --border: rgba(79,195,247,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--sky);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated sky background */
  .sky-bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(170deg, #050d1a 0%, #0d2244 40%, #0a3060 70%, #0d2244 100%);
    overflow: hidden;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
    opacity: var(--op, 0.6);
  }
  @keyframes twinkle { from { opacity: 0.1; } to { opacity: var(--op, 0.8); } }
  .cloud-layer {
    position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
    background: linear-gradient(to top, rgba(13,34,68,0.8) 0%, transparent 100%);
  }

  .app {
    position: relative; z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.6s ease both;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--accent2); font-style: italic; }

  /* Search */
  .search-wrap {
    display: flex; gap: 0.5rem;
    margin-bottom: 2rem;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .search-wrap input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 1.2rem;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }
  .btn {
    background: var(--accent);
    color: #050d1a;
    border: none;
    border-radius: 12px;
    padding: 0.75rem 1.2rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: #81d4fa; }
  .btn:active { transform: scale(0.97); }
  .btn-loc {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .btn-loc:hover { background: rgba(79,195,247,0.15); }

  /* Current weather card */
  .current-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 2rem;
    margin-bottom: 1.5rem;
    backdrop-filter: blur(10px);
    animation: fadeUp 0.6s 0.2s ease both;
    position: relative;
    overflow: hidden;
  }
  .current-card::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,195,247,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .current-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    flex-wrap: wrap; gap: 1rem;
  }
  .location-name {
    font-size: 1.4rem; font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .current-date { color: var(--muted); font-size: 0.9rem; }
  .current-right { text-align: right; }
  .current-temp {
    font-family: 'DM Serif Display', serif;
    font-size: 5rem; line-height: 1;
    color: var(--accent);
  }
  .current-desc {
    color: var(--muted); font-size: 1rem;
    margin-top: 0.3rem;
  }
  .weather-icon { font-size: 3rem; margin-bottom: 0.2rem; }

  .current-details {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .detail-item { text-align: center; }
  .detail-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .detail-label { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }

  /* Hourly */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem; color: var(--accent2);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .hourly-scroll {
    display: flex; gap: 0.75rem;
    overflow-x: auto;
    padding-bottom: 0.5rem;
    margin-bottom: 1.5rem;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .hourly-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1rem 0.8rem;
    min-width: 80px;
    text-align: center;
    flex-shrink: 0;
    backdrop-filter: blur(6px);
    transition: border-color 0.2s, background 0.2s;
  }
  .hourly-card:hover {
    border-color: var(--accent);
    background: rgba(79,195,247,0.1);
  }
  .hourly-card.active {
    border-color: var(--accent);
    background: rgba(79,195,247,0.15);
  }
  .h-time { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.4rem; }
  .h-icon { font-size: 1.5rem; margin-bottom: 0.3rem; }
  .h-temp { font-size: 0.95rem; font-weight: 700; }
  .h-rain { font-size: 0.72rem; color: #90caf9; margin-top: 0.2rem; }

  /* 7-day forecast */
  .weekly-grid {
    display: grid;
    gap: 0.6rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .day-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.9rem 1.2rem;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    gap: 1rem;
    backdrop-filter: blur(6px);
    transition: border-color 0.2s;
  }
  .day-row:hover { border-color: var(--accent); }
  .day-name { font-weight: 700; font-size: 0.95rem; }
  .day-icon { font-size: 1.4rem; }
  .day-desc { font-size: 0.78rem; color: var(--muted); text-align: right; min-width: 80px; }
  .day-temps { display: flex; gap: 0.6rem; align-items: center; }
  .temp-hi { color: var(--accent2); font-weight: 700; }
  .temp-lo { color: var(--muted); font-size: 0.85rem; }

  /* Loading / error */
  .status {
    text-align: center; padding: 4rem 2rem;
    color: var(--muted);
    font-size: 1.1rem;
    animation: fadeUp 0.5s ease both;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: none; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: none; }
  }

  @media (max-width: 520px) {
    .current-temp { font-size: 3.5rem; }
    .day-row { grid-template-columns: 1fr auto auto; }
    .day-desc { display: none; }
  }
</style>
</head>
<body>

<div class="sky-bg" id="skyBg">
  <div class="cloud-layer"></div>
</div>

<div class="app">
  <header>
    <div class="logo">날씨<span>예보</span></div>
    <div style="font-size:0.8rem;color:var(--muted);">Open-Meteo 데이터</div>
  </header>

  <div class="search-wrap">
    <input type="text" id="cityInput" placeholder="도시 이름 입력 (예: 서울, 부산, Tokyo...)" />
    <button class="btn" onclick="searchCity()">검색</button>
    <button class="btn btn-loc" onclick="getLocation()" title="현재 위치">📍</button>
  </div>

  <div id="content">
    <div class="status">
      <div style="font-size:3rem;margin-bottom:1rem;">🌤️</div>
      도시를 검색하거나 📍 버튼으로<br>현재 위치 날씨를 확인하세요
    </div>
  </div>
</div>

<script>
// Create stars
(function(){
  const bg = document.getElementById('skyBg');
  for(let i=0;i<80;i++){
    const s = document.createElement('div');
    s.className='star';
    const size = Math.random()*2+1;
    s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*70}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--op:${0.3+Math.random()*0.7}`;
    bg.appendChild(s);
  }
})();

const GEOCODE_URL = 'https://geocoding-api.open-meteo.com/v1/search';
const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast';

const WMO = {
  0:'맑음',1:'대체로 맑음',2:'부분 흐림',3:'흐림',
  45:'안개',48:'서리 안개',
  51:'약한 이슬비',53:'이슬비',55:'강한 이슬비',
  61:'약한 비',63:'비',65:'강한 비',
  71:'약한 눈',73:'눈',75:'강한 눈',
  80:'소나기',81:'강한 소나기',82:'폭우',
  85:'약한 눈소나기',86:'눈소나기',
  95:'뇌우',96:'뇌우+우박',99:'강한 뇌우+우박'
};

const ICONS = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌧️',55:'🌧️',
  61:'🌦️',63:'🌧️',65:'⛈️',
  71:'🌨️',73:'❄️',75:'❄️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  85:'🌨️',86:'❄️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};

function wmoDesc(c){ return WMO[c]||'알 수 없음'; }
function wmoIcon(c){ return ICONS[c]||'🌡️'; }

const DAYS = ['일','월','화','수','목','금','토'];

function loading(){
  document.getElementById('content').innerHTML=`<div class="status"><div class="spinner"></div>불러오는 중...</div>`;
}
function error(msg){
  document.getElementById('content').innerHTML=`<div class="status">⚠️ ${msg}</div>`;
}

async function searchCity(){
  const q = document.getElementById('cityInput').value.trim();
  if(!q) return;
  loading();
  try{
    const r = await fetch(`${GEOCODE_URL}?name=${encodeURIComponent(q)}&count=1&language=ko`);
    const d = await r.json();
    if(!d.results||!d.results.length){ error('도시를 찾을 수 없습니다.'); return; }
    const loc = d.results[0];
    await fetchWeather(loc.latitude, loc.longitude, loc.name+(loc.country_code?', '+loc.country_code:''));
  }catch(e){ error('오류가 발생했습니다. 다시 시도해 주세요.'); }
}

function getLocation(){
  if(!navigator.geolocation){ error('위치 정보를 지원하지 않는 브라우저입니다.'); return; }
  loading();
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude:lat, longitude:lon} = pos.coords;
      // Reverse geocode
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ko`);
      const d = await r.json();
      const name = d.address?.city || d.address?.town || d.address?.county || '현재 위치';
      await fetchWeather(lat, lon, name);
    }catch(e){ await fetchWeather(pos.coords.latitude, pos.coords.longitude, '현재 위치'); }
  }, ()=>{ error('위치 접근이 거부되었습니다.'); });
}

async function fetchWeather(lat, lon, name){
  try{
    const params = new URLSearchParams({
      latitude: lat, longitude: lon,
      current: 'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,precipitation',
      hourly: 'temperature_2m,precipitation_probability,weather_code',
      daily: 'weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset',
      timezone: 'auto',
      forecast_days: 7,
      wind_speed_unit: 'ms'
    });
    const r = await fetch(`${WEATHER_URL}?${params}`);
    const d = await r.json();
    renderWeather(d, name);
  }catch(e){ error('날씨 데이터를 불러오지 못했습니다.'); }
}

function renderWeather(d, name){
  const c = d.current;
  const tz = d.timezone;
  const now = new Date(c.time);

  // Date string
  const dateStr = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const timeStr = now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});

  // Current
  const currentHTML = `
    <div class="current-card">
      <div class="current-top">
        <div>
          <div class="location-name">📍 ${name}</div>
          <div class="current-date">${dateStr} ${timeStr} 기준</div>
        </div>
        <div class="current-right">
          <div class="weather-icon">${wmoIcon(c.weather_code)}</div>
          <div class="current-temp">${Math.round(c.temperature_2m)}°</div>
          <div class="current-desc">${wmoDesc(c.weather_code)}</div>
        </div>
      </div>
      <div class="current-details">
        <div class="detail-item">
          <div class="detail-val">${Math.round(c.apparent_temperature)}°</div>
          <div class="detail-label">체감 온도</div>
        </div>
        <div class="detail-item">
          <div class="detail-val">${c.relative_humidity_2m}%</div>
          <div class="detail-label">습도</div>
        </div>
        <div class="detail-item">
          <div class="detail-val">${c.wind_speed_10m} m/s</div>
          <div class="detail-label">바람</div>
        </div>
        <div class="detail-item">
          <div class="detail-val">${c.precipitation} mm</div>
          <div class="detail-label">강수량</div>
        </div>
        <div class="detail-item">
          <div class="detail-val">${new Date(d.daily.sunrise[0]).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="detail-label">일출</div>
        </div>
        <div class="detail-item">
          <div class="detail-val">${new Date(d.daily.sunset[0]).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</div>
          <div class="detail-label">일몰</div>
        </div>
      </div>
    </div>
  `;

  // Hourly (next 24h)
  const nowHour = now.getHours();
  let hourlyHTML = `<div class="section-title">⏱ 시간별 예보</div><div class="hourly-scroll">`;
  const times = d.hourly.time;
  let count = 0;
  for(let i=0;i<times.length && count<24;i++){
    const t = new Date(times[i]);
    if(t < now) continue;
    const h = t.getHours();
    const active = count===0?'active':'';
    hourlyHTML += `
      <div class="hourly-card ${active}">
        <div class="h-time">${h.toString().padStart(2,'0')}시</div>
        <div class="h-icon">${wmoIcon(d.hourly.weather_code[i])}</div>
        <div class="h-temp">${Math.round(d.hourly.temperature_2m[i])}°</div>
        <div class="h-rain">🌧 ${d.hourly.precipitation_probability[i]}%</div>
      </div>`;
    count++;
  }
  hourlyHTML += `</div>`;

  // Weekly
  let weeklyHTML = `<div class="section-title">📅 7일 예보</div><div class="weekly-grid">`;
  for(let i=0;i<7;i++){
    const date = new Date(d.daily.time[i]);
    const dayName = i===0?'오늘': i===1?'내일': DAYS[date.getDay()]+'요일';
    weeklyHTML += `
      <div class="day-row">
        <div class="day-name">${dayName} <span style="color:var(--muted);font-size:0.75rem;font-weight:400">${(date.getMonth()+1)}/${date.getDate()}</span></div>
        <div class="day-icon">${wmoIcon(d.daily.weather_code[i])}</div>
        <div class="day-desc">${wmoDesc(d.daily.weather_code[i])} · 강수 ${d.daily.precipitation_probability_max[i]}%</div>
        <div class="day-temps">
          <span class="temp-hi">${Math.round(d.daily.temperature_2m_max[i])}°</span>
          <span class="temp-lo">${Math.round(d.daily.temperature_2m_min[i])}°</span>
        </div>
      </div>`;
  }
  weeklyHTML += `</div>`;

  document.getElementById('content').innerHTML = currentHTML + hourlyHTML + weeklyHTML;
}

// Enter key support
document.getElementById('cityInput').addEventListener('keydown', e=>{ if(e.key==='Enter') searchCity(); });

// Auto-load with Seoul
window.addEventListener('load', ()=>{
  fetchWeather(37.5665, 126.9780, '서울, KR');
});
</script>
</body>
</html>
